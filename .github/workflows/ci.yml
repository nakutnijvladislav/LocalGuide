name: CI + Quality + Review Check

on:
  pull_request:
    types: [opened, synchronize, reopened, review_requested, edited]
    branches: [develop]
  push:
    branches:
      - master  # додаємо запуск для master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # Клон репозиторію
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Встановлюємо .NET 8
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Відновлюємо пакети
      - run: dotnet restore

      # Збираємо проєкт
      - run: dotnet build --no-restore --configuration Release

      # Тестуємо з покриттям
      - name: Run tests with coverage
        run: dotnet test ./LocalGuide.Tests/LocalGuide.Tests.csproj --no-build --configuration Release --collect:"XPlat Code Coverage"

      # Підрахунок рядків коду
      - name: Count lines of code with Cloc
        run: |
          sudo apt-get update && sudo apt-get install -y cloc
          cloc --include-lang=C#,XML,JSON,YAML . > cloc-report.txt
          cat cloc-report.txt

  analysis:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      # Клон репозиторію з повним fetch
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Встановлюємо .NET 8 для SonarCloud
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Встановлюємо SonarScanner
      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      # Визначаємо гілку для аналізу
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV

      # Початок аналізу SonarCloud
      - name: SonarCloud Begin Analysis
        run: |
          dotnet sonarscanner begin \
            /k:"nakutnijvladislav_LocalGuide" \
            /o:"nakutnijvladislav" \
            /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.branch.name="$BRANCH_NAME"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Повторна збірка та тестування з покриттям для SonarCloud
      - name: Build & Test for SonarCloud
        run: |
          dotnet build --configuration Release
          dotnet test ./LocalGuide.Tests/LocalGuide.Tests.csproj --no-build --configuration Release --collect:"XPlat Code Coverage"

      # Завершення аналізу SonarCloud
      - name: End SonarCloud analysis
        run: dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Перевірка стилю коду
      - name: Check code style (dotnet format)
        run: dotnet format --verify-no-changes --severity error
